name: Update dashboard

# Runs on GitHub's servers on a schedule — independent of any personal machine.
# Regenerates data.json from the official Senate/House disclosure feeds and
# commits it, which triggers the GitHub Pages redeploy.

on:
  schedule:
    # Times are UTC. Three weekday refreshes spanning the US trading day:
    - cron: "0 14 * * 1-5"   # ~7am PT / 10am ET (around market open)
    - cron: "0 18 * * 1-5"   # ~11am PT / 2pm ET
    - cron: "30 22 * * 1-5"  # ~3:30pm PT / 6:30pm ET (after close, late filings)
  workflow_dispatch: {}       # allow manual "Run workflow" from the Actions tab

# Let the job commit data.json back to the repo.
permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install poppler (pdftotext for House PDFs)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends poppler-utils

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Generate data.json
        env:
          SKIP_ALPACA: "1"                       # no brokerage keys off-machine
          DATA_OUT: ${{ github.workspace }}/data.json
        run: python pipeline/run.py --force --feed-days 60 --ltm-days 365

      - name: Commit & push if changed
        run: |
          git config user.name "congress-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No change in data.json — nothing to commit."
          else
            git add data.json
            git commit -m "data refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
